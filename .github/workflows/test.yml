# This workflow has limitations -- Ubuntu lacks a redo package.
---
name: test
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  BASE_REL: 0.9.20260404
  BASE_URL: https://github.com/rdavid/shellbase/archive/refs/tags
jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - ubuntu-22.04
          - ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - if: runner.os == 'Linux'
        run: |
          g++ -std=c++03 -Wall -Werror -pedantic -o app main.cpp
          ./app
      - if: runner.os == 'macOS'
        run: |
          brew install goredo
          curl --fail --location --silent "$BASE_URL/v$BASE_REL.tar.gz" |
            sudo tar \
              --directory /usr/local/bin \
              --extract \
              --gzip \
              --strip-components=2 \
              shellbase-"$BASE_REL"/lib/base.sh
          redo -xx
