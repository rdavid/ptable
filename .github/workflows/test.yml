# This workflow has limitations -- Ubuntu lacks a redo package.
---
name: test
'on':
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: sh
jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - if: runner.os == 'Linux'
        run: |
          g++ -std=c++03 -Wall -Werror -pedantic -o app main.cpp
          ./app
      - if: runner.os == 'macOS'
        run: |
          srv=https://github.com/rdavid/shellbase/archive/refs/tags
          ver=0.9.20260707
          brew install goredo
          curl \
            --fail \
            --location \
            --silent \
            "$srv/v$ver.tar.gz" |
            sudo tar \
              --directory /usr/local/bin \
              --extract \
              --gzip \
              --strip-components=2 \
              shellbase-"$ver"/lib/base.sh
          redo -xx
