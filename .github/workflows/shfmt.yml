---
name: shfmt
'on': [pull_request, push]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: mfinelli/setup-shfmt@v4
      - run: shfmt -d ./*.do
