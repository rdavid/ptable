---
name: checkmake
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CM_BIN: /usr/local/bin/checkmake
  CM_URL: https://github.com/checkmake/checkmake/releases/download/v0.3.2/checkmake-v0.3.2.linux.amd64 # yamllint disable-line
jobs:
  checkmake:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: |
          sudo curl \
            --fail \
            --location \
            --output "$CM_BIN" \
            --show-error \
            --silent \
            "$CM_URL"
          sudo chmod +x "$CM_BIN"
          "$CM_BIN" Makefile
